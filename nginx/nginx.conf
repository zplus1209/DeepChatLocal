worker_processes auto;
pid /tmp/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # ── Security headers ─────────────────────────────
  add_header X-Frame-Options           "SAMEORIGIN"       always;
  add_header X-Content-Type-Options    "nosniff"          always;
  add_header X-XSS-Protection          "1; mode=block"    always;
  add_header Referrer-Policy           "no-referrer"      always;
  add_header Permissions-Policy        "geolocation=()"   always;
  add_header Content-Security-Policy
    "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self';"
    always;
  # Remove server version fingerprint
  server_tokens off;

  # ── Rate limiting ─────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
  limit_req_zone $binary_remote_addr zone=chat:10m rate=10r/m;
  limit_conn_zone $binary_remote_addr zone=perip:10m;

  # ── Upload size ───────────────────────────────────
  client_max_body_size 50m;
  client_body_timeout 60s;
  client_header_timeout 20s;
  send_timeout 60s;

  # ── Gzip ──────────────────────────────────────────
  gzip on;
  gzip_types text/plain text/css application/json application/javascript;
  gzip_min_length 1024;

  # ── Logging ───────────────────────────────────────
  log_format main '$remote_addr - [$time_local] "$request" $status $body_bytes_sent "$http_referer" rt=$request_time';
  access_log /var/log/nginx/access.log main;

  server {
    listen 80;
    server_name _;

    # ── Frontend static ───────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    location / {
      try_files $uri $uri/ /index.html;
      # Cache static assets
      location ~* \.(js|css|png|jpg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
      }
    }

    # ── Backend API proxy ─────────────────────────
    location /api/ {
      limit_req zone=api burst=20 nodelay;
      limit_conn perip 10;

      proxy_pass         http://backend:8000;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 120s;

      # Block access to Ollama port from outside
      proxy_hide_header  X-Powered-By;
    }

    # ── Chat endpoint - stricter rate limit ───────
    location /api/v1/chat {
      limit_req zone=chat burst=5 nodelay;
      proxy_pass         http://backend:8000;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_read_timeout 120s;
    }

    # ── Block internal paths ──────────────────────
    location ~ /\. { deny all; return 404; }
    location = /robots.txt { return 200 "User-agent: *\nDisallow: /api/\n"; }
  }
}